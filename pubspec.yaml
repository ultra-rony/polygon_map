name: polygon_map
description: "A flexible Flutter map widget for creating, editing, and managing polygons with interactive controls."
version: 0.0.1
homepage: https://github.com/ultra-rony/polygon_map

repository: https://github.com/ultra-rony/polygon_map
topics: [polygon, geospatial, drawing, interactive, geolocation]

environment:
  sdk: ^3.11.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

screenshots:
  - description: The logo of the polygon_map package.
    path: screenshots/logo.png
